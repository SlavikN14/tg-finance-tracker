name: Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Start infra
        run: docker compose -f env/docker-compose.yaml up -d mongo redis nats zookeeper kafka schema-registry

      - name: Build & test
        run: ./gradlew build

      - name: Smoke Test
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
        run: |
          if [ -z "$BOT_TOKEN" ]; then
            echo "::warning::Skipping — BOT_TOKEN not set"
            exit 0
          fi
          docker compose -f env/docker-compose.yaml up -d --build telegram-bot finance-service
          sleep 30
          docker compose -f env/docker-compose.yaml ps
          running=$(docker compose -f env/docker-compose.yaml ps --services --filter status=running)
          for svc in finance-service telegram-bot; do
            grep -qx "$svc" <<<"$running" || { docker compose -f env/docker-compose.yaml logs "$svc"; exit 1; }
          done

      - name: Shutdown
        if: always()
        run: docker compose -f env/docker-compose.yaml down -v